<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YARROW Hero Concepts</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0D0B08; color: #F0EBE3; font-family: 'Cinzel', serif; }

.concept {
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  border-bottom: 1px solid rgba(196,149,107,0.1);
}

.concept-label {
  position: absolute;
  top: 20px;
  left: 20px;
  font-size: 12px;
  letter-spacing: 0.3em;
  color: rgba(196,149,107,0.4);
  text-transform: uppercase;
}

/* ═══════════════════════════════════════
   CONCEPT 1: Rotating Bagua + Center Text
   ═══════════════════════════════════════ */
.c1-bagua {
  position: absolute;
  width: 500px;
  height: 500px;
  animation: c1-rotate 120s linear infinite;
  opacity: 0.12;
}

@keyframes c1-rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.c1-bagua-inner {
  position: absolute;
  width: 350px;
  height: 350px;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  animation: c1-rotate 90s linear infinite reverse;
  opacity: 0.08;
}

.c1-yinyang {
  position: absolute;
  width: 80px;
  height: 80px;
  animation: c1-rotate 30s linear infinite;
  opacity: 0.15;
}

.c1-title {
  font-size: 52px;
  letter-spacing: 0.5em;
  font-weight: 400;
  background: linear-gradient(90deg, #8A7558, #C4956B, #F0EBE3, #D4A87B, #C4956B, #8A7558);
  background-size: 300% auto;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shimmer 4s linear infinite;
  position: relative;
  z-index: 2;
}

@keyframes shimmer {
  0% { background-position: 300% center; }
  100% { background-position: 0% center; }
}

.c1-subtitle {
  font-size: 11px;
  letter-spacing: 0.3em;
  color: rgba(196,149,107,0.4);
  margin-top: 20px;
  position: relative;
  z-index: 2;
}

/* Floating yao lines */
.yao-line {
  position: absolute;
  height: 2px;
  background: rgba(196,149,107,0.15);
  border-radius: 1px;
}

.yao-broken {
  background: transparent;
  display: flex;
  gap: 8px;
  position: absolute;
  height: 2px;
}
.yao-broken span {
  display: block;
  height: 2px;
  background: rgba(196,149,107,0.12);
  border-radius: 1px;
}

.float-1 { animation: float1 12s ease-in-out infinite; }
.float-2 { animation: float2 15s ease-in-out infinite; }
.float-3 { animation: float3 18s ease-in-out infinite; }
.float-4 { animation: float4 14s ease-in-out infinite; }

@keyframes float1 { 0%,100% { transform: translateY(0) translateX(0); opacity: 0.15; } 50% { transform: translateY(-20px) translateX(10px); opacity: 0.25; } }
@keyframes float2 { 0%,100% { transform: translateY(0) translateX(0); opacity: 0.1; } 50% { transform: translateY(15px) translateX(-15px); opacity: 0.2; } }
@keyframes float3 { 0%,100% { transform: translateY(0) translateX(0); opacity: 0.12; } 50% { transform: translateY(-25px) translateX(-10px); opacity: 0.22; } }
@keyframes float4 { 0%,100% { transform: translateY(0) translateX(0); opacity: 0.08; } 50% { transform: translateY(20px) translateX(15px); opacity: 0.18; } }

/* ═══════════════════════════════════════
   CONCEPT 2: Hexagram Stack + Yin Yang Pulse
   ═══════════════════════════════════════ */
.c2-hexagram-left, .c2-hexagram-right {
  position: absolute;
  display: flex;
  flex-direction: column;
  gap: 6px;
  opacity: 0.2;
}
.c2-hexagram-left { left: 15%; top: 50%; transform: translateY(-50%); }
.c2-hexagram-right { right: 15%; top: 50%; transform: translateY(-50%); }

.c2-yao {
  height: 3px;
  border-radius: 1.5px;
  transition: all 0.5s;
}
.c2-yao.yang { width: 50px; background: #C4956B; }
.c2-yao.yin {
  width: 50px;
  display: flex;
  gap: 10px;
}
.c2-yao.yin span {
  flex: 1;
  height: 3px;
  background: #C4956B;
  border-radius: 1.5px;
}

.c2-pulse-ring {
  position: absolute;
  border: 1px solid rgba(196,149,107,0.08);
  border-radius: 50%;
  animation: c2-pulse 6s ease-out infinite;
}

@keyframes c2-pulse {
  0% { transform: scale(0.8); opacity: 0.15; }
  100% { transform: scale(2.5); opacity: 0; }
}

.c2-center {
  position: relative;
  z-index: 2;
  text-align: center;
}

.c2-yinyang-small {
  width: 40px;
  height: 40px;
  margin: 0 auto 24px;
  animation: c2-spin 20s linear infinite;
  opacity: 0.5;
}

@keyframes c2-spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.c2-title {
  font-size: 48px;
  letter-spacing: 0.6em;
  font-weight: 400;
  color: #C4956B;
  text-shadow: 0 0 40px rgba(196,149,107,0.2), 0 0 80px rgba(196,149,107,0.1);
}

.c2-line-deco {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-top: 16px;
}
.c2-line-deco .line { width: 40px; height: 1px; background: linear-gradient(90deg, transparent, rgba(196,149,107,0.3), transparent); }
.c2-line-deco .dot { width: 3px; height: 3px; background: rgba(196,149,107,0.4); transform: rotate(45deg); }

/* Hexagram line animations */
.hex-anim .c2-yao { animation: hexFade 4s ease-in-out infinite; }
.hex-anim .c2-yao:nth-child(1) { animation-delay: 0s; }
.hex-anim .c2-yao:nth-child(2) { animation-delay: 0.3s; }
.hex-anim .c2-yao:nth-child(3) { animation-delay: 0.6s; }
.hex-anim .c2-yao:nth-child(4) { animation-delay: 0.9s; }
.hex-anim .c2-yao:nth-child(5) { animation-delay: 1.2s; }
.hex-anim .c2-yao:nth-child(6) { animation-delay: 1.5s; }

@keyframes hexFade {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

/* ═══════════════════════════════════════
   CONCEPT 3: Minimal Orbiting Trigrams
   ═══════════════════════════════════════ */
.c3-orbit {
  position: absolute;
  border: 1px solid rgba(196,149,107,0.06);
  border-radius: 50%;
}
.c3-orbit-1 { width: 300px; height: 300px; animation: c3-spin 60s linear infinite; }
.c3-orbit-2 { width: 450px; height: 450px; animation: c3-spin 80s linear infinite reverse; }
.c3-orbit-3 { width: 600px; height: 600px; animation: c3-spin 100s linear infinite; }

@keyframes c3-spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* Trigram nodes on orbits */
.c3-trigram {
  position: absolute;
  display: flex;
  flex-direction: column;
  gap: 3px;
  opacity: 0.25;
}
.c3-trigram .tline {
  height: 2px;
  background: #C4956B;
  border-radius: 1px;
}
.c3-trigram .tline.solid { width: 20px; }
.c3-trigram .tline.broken {
  width: 20px;
  background: transparent;
  display: flex;
  gap: 4px;
}
.c3-trigram .tline.broken span {
  flex: 1;
  height: 2px;
  background: #C4956B;
  border-radius: 1px;
}

/* Position trigrams on orbit edges */
.c3-orbit-1 .c3-trigram:nth-child(1) { top: -10px; left: 50%; transform: translateX(-50%); }
.c3-orbit-1 .c3-trigram:nth-child(2) { bottom: -10px; left: 50%; transform: translateX(-50%); }
.c3-orbit-1 .c3-trigram:nth-child(3) { top: 50%; right: -15px; transform: translateY(-50%); }
.c3-orbit-1 .c3-trigram:nth-child(4) { top: 50%; left: -15px; transform: translateY(-50%); }

.c3-orbit-2 .c3-trigram:nth-child(1) { top: 15%; right: 5%; }
.c3-orbit-2 .c3-trigram:nth-child(2) { bottom: 15%; left: 5%; }
.c3-orbit-2 .c3-trigram:nth-child(3) { top: 5%; left: 15%; }
.c3-orbit-2 .c3-trigram:nth-child(4) { bottom: 5%; right: 15%; }

.c3-center {
  position: relative;
  z-index: 2;
  text-align: center;
}

.c3-title {
  font-size: 44px;
  letter-spacing: 0.7em;
  font-weight: 400;
  color: transparent;
  -webkit-text-stroke: 1px rgba(196,149,107,0.6);
  position: relative;
}

.c3-title-fill {
  position: absolute;
  inset: 0;
  font-size: 44px;
  letter-spacing: 0.7em;
  font-weight: 400;
  color: #C4956B;
  clip-path: inset(0 100% 0 0);
  animation: c3-reveal 3s ease-out forwards 0.5s;
}

@keyframes c3-reveal {
  to { clip-path: inset(0 0 0 0); }
}

.c3-tagline {
  font-size: 10px;
  letter-spacing: 0.4em;
  color: rgba(196,149,107,0.3);
  margin-top: 24px;
}

/* Breathing glow behind center */
.c3-glow {
  position: absolute;
  width: 200px;
  height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(196,149,107,0.08) 0%, transparent 70%);
  animation: breathe 5s ease-in-out infinite;
}

@keyframes breathe {
  0%, 100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.3); opacity: 1; }
}
</style>
</head>
<body>

<!-- ═══ CONCEPT 1: Rotating Bagua ═══ -->
<div class="concept" id="c1">
  <div class="concept-label">方案一 · 八卦旋转</div>

  <!-- Bagua outer ring -->
  <svg class="c1-bagua" viewBox="0 0 500 500">
    <circle cx="250" cy="250" r="240" fill="none" stroke="#C4956B" stroke-width="0.5" opacity="0.3"/>
    <circle cx="250" cy="250" r="200" fill="none" stroke="#C4956B" stroke-width="0.3" opacity="0.2"/>
    <!-- 8 trigrams around the circle -->
    <g transform="translate(250,30)"><!-- 乾 ☰ -->
      <rect x="-15" y="0" width="30" height="3" rx="1" fill="#C4956B"/>
      <rect x="-15" y="6" width="30" height="3" rx="1" fill="#C4956B"/>
      <rect x="-15" y="12" width="30" height="3" rx="1" fill="#C4956B"/>
    </g>
    <g transform="translate(405,105)"><!-- 巽 ☴ -->
      <rect x="-15" y="0" width="30" height="3" rx="1" fill="#C4956B"/>
      <rect x="-15" y="6" width="30" height="3" rx="1" fill="#C4956B"/>
      <rect x="-15" y="12" width="12" height="3" rx="1" fill="#C4956B"/>
      <rect x="3" y="12" width="12" height="3" rx="1" fill="#C4956B"/>
    </g>
    <g transform="translate(460,250)"><!-- 坎 ☵ -->
      <rect x="-15" y="0" width="12" height="3" rx="1" fill="#C4956B"/>
      <rect x="3" y="0" width="12" height="3" rx="1" fill="#C4956B"/>
      <rect x="-15" y="6" width="30" height="3" rx="1" fill="#C4956B"/>
      <rect x="-15" y="12" width="12" height="3" rx="1" fill="#C4956B"/>
      <rect x="3" y="12" width="12" height="3" rx="1" fill="#C4956B"/>
    </g>
    <g transform="translate(405,395)"><!-- 艮 ☶ -->
      <rect x="-15" y="0" width="30" height="3" rx="1" fill="#C4956B"/>
      <rect x="-15" y="6" width="12" height="3" rx="1" fill="#C4956B"/>
      <rect x="3" y="6" width="12" height="3" rx="1" fill="#C4956B"/>
      <rect x="-15" y="12" width="12" height="3" rx="1" fill="#C4956B"/>
      <rect x="3" y="12" width="12" height="3" rx="1" fill="#C4956B"/>
    </g>
    <g transform="translate(250,460)"><!-- 坤 ☷ -->
      <rect x="-15" y="0" width="12" height="3" rx="1" fill="#C4956B"/>
      <rect x="3" y="0" width="12" height="3" rx="1" fill="#C4956B"/>
      <rect x="-15" y="6" width="12" height="3" rx="1" fill="#C4956B"/>
      <rect x="3" y="6" width="12" height="3" rx="1" fill="#C4956B"/>
      <rect x="-15" y="12" width="12" height="3" rx="1" fill="#C4956B"/>
      <rect x="3" y="12" width="12" height="3" rx="1" fill="#C4956B"/>
    </g>
    <g transform="translate(95,395)"><!-- 震 ☳ -->
      <rect x="-15" y="0" width="12" height="3" rx="1" fill="#C4956B"/>
      <rect x="3" y="0" width="12" height="3" rx="1" fill="#C4956B"/>
      <rect x="-15" y="6" width="12" height="3" rx="1" fill="#C4956B"/>
      <rect x="3" y="6" width="12" height="3" rx="1" fill="#C4956B"/>
      <rect x="-15" y="12" width="30" height="3" rx="1" fill="#C4956B"/>
    </g>
    <g transform="translate(40,250)"><!-- 离 ☲ -->
      <rect x="-15" y="0" width="30" height="3" rx="1" fill="#C4956B"/>
      <rect x="-15" y="6" width="12" height="3" rx="1" fill="#C4956B"/>
      <rect x="3" y="6" width="12" height="3" rx="1" fill="#C4956B"/>
      <rect x="-15" y="12" width="30" height="3" rx="1" fill="#C4956B"/>
    </g>
    <g transform="translate(95,105)"><!-- 兑 ☱ -->
      <rect x="-15" y="0" width="12" height="3" rx="1" fill="#C4956B"/>
      <rect x="3" y="0" width="12" height="3" rx="1" fill="#C4956B"/>
      <rect x="-15" y="6" width="30" height="3" rx="1" fill="#C4956B"/>
      <rect x="-15" y="12" width="30" height="3" rx="1" fill="#C4956B"/>
    </g>
    <!-- Yin-yang center -->
    <circle cx="250" cy="250" r="35" fill="none" stroke="#C4956B" stroke-width="0.5" opacity="0.4"/>
    <path d="M250,215 A35,35 0 0,1 250,285 A17.5,17.5 0 0,0 250,250 A17.5,17.5 0 0,1 250,215" fill="#C4956B" opacity="0.15"/>
    <circle cx="250" cy="232.5" r="4" fill="#C4956B" opacity="0.2"/>
    <circle cx="250" cy="267.5" r="4" fill="none" stroke="#C4956B" stroke-width="0.5" opacity="0.2"/>
  </svg>

  <!-- Floating yao lines -->
  <div class="yao-line float-1" style="width:60px; top:25%; left:10%;"></div>
  <div class="yao-line float-2" style="width:45px; top:70%; right:12%;"></div>
  <div class="yao-broken float-3" style="top:30%; right:18%;"><span style="width:20px;"></span><span style="width:20px;"></span></div>
  <div class="yao-broken float-4" style="bottom:25%; left:15%;"><span style="width:18px;"></span><span style="width:18px;"></span></div>
  <div class="yao-line float-2" style="width:35px; bottom:35%; left:8%;"></div>
  <div class="yao-line float-3" style="width:50px; top:20%; right:25%;"></div>

  <span class="c1-title">YARROW</span>
  <span class="c1-subtitle">六爻在线占卦</span>
</div>

<!-- ═══ CONCEPT 2: Hexagram Flanks + Pulse ═══ -->
<div class="concept" id="c2">
  <div class="concept-label">方案二 · 卦象脉动</div>

  <!-- Pulse rings -->
  <div class="c2-pulse-ring" style="width:150px;height:150px;left:50%;top:50%;margin-left:-75px;margin-top:-75px;"></div>
  <div class="c2-pulse-ring" style="width:150px;height:150px;left:50%;top:50%;margin-left:-75px;margin-top:-75px;animation-delay:2s;"></div>
  <div class="c2-pulse-ring" style="width:150px;height:150px;left:50%;top:50%;margin-left:-75px;margin-top:-75px;animation-delay:4s;"></div>

  <!-- Left hexagram (乾 ☰) -->
  <div class="c2-hexagram-left hex-anim">
    <div class="c2-yao yang"></div>
    <div class="c2-yao yang"></div>
    <div class="c2-yao yang"></div>
    <div class="c2-yao yin"><span></span><span></span></div>
    <div class="c2-yao yang"></div>
    <div class="c2-yao yang"></div>
  </div>

  <!-- Right hexagram (坤 ☷) -->
  <div class="c2-hexagram-right hex-anim">
    <div class="c2-yao yin"><span></span><span></span></div>
    <div class="c2-yao yang"></div>
    <div class="c2-yao yin"><span></span><span></span></div>
    <div class="c2-yao yang"></div>
    <div class="c2-yao yin"><span></span><span></span></div>
    <div class="c2-yao yang"></div>
  </div>

  <div class="c2-center">
    <!-- Small yin-yang -->
    <svg class="c2-yinyang-small" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="48" fill="none" stroke="#C4956B" stroke-width="1"/>
      <path d="M50,2 A48,48 0 0,1 50,98 A24,24 0 0,0 50,50 A24,24 0 0,1 50,2" fill="#C4956B" opacity="0.3"/>
      <circle cx="50" cy="26" r="6" fill="#C4956B" opacity="0.4"/>
      <circle cx="50" cy="74" r="6" fill="none" stroke="#C4956B" stroke-width="1" opacity="0.3"/>
    </svg>

    <div class="c2-title">YARROW</div>
    <div class="c2-line-deco">
      <div class="line"></div>
      <div class="dot"></div>
      <div class="line"></div>
    </div>
    <div style="font-size:11px;letter-spacing:0.3em;color:rgba(196,149,107,0.35);margin-top:12px;">六爻在线占卦</div>
  </div>
</div>

<!-- ═══ CONCEPT 3: Orbital Trigrams ═══ -->
<div class="concept" id="c3">
  <div class="concept-label">方案三 · 轨道卦象</div>

  <div class="c3-glow"></div>

  <!-- Orbit 1 -->
  <div class="c3-orbit c3-orbit-1" style="left:50%;top:50%;margin-left:-150px;margin-top:-150px;">
    <div class="c3-trigram"><!-- 乾 -->
      <div class="tline solid"></div><div class="tline solid"></div><div class="tline solid"></div>
    </div>
    <div class="c3-trigram"><!-- 坤 -->
      <div class="tline broken"><span></span><span></span></div>
      <div class="tline broken"><span></span><span></span></div>
      <div class="tline broken"><span></span><span></span></div>
    </div>
    <div class="c3-trigram"><!-- 离 -->
      <div class="tline solid"></div>
      <div class="tline broken"><span></span><span></span></div>
      <div class="tline solid"></div>
    </div>
    <div class="c3-trigram"><!-- 坎 -->
      <div class="tline broken"><span></span><span></span></div>
      <div class="tline solid"></div>
      <div class="tline broken"><span></span><span></span></div>
    </div>
  </div>

  <!-- Orbit 2 -->
  <div class="c3-orbit c3-orbit-2" style="left:50%;top:50%;margin-left:-225px;margin-top:-225px;">
    <div class="c3-trigram"><!-- 巽 -->
      <div class="tline solid"></div><div class="tline solid"></div>
      <div class="tline broken"><span></span><span></span></div>
    </div>
    <div class="c3-trigram"><!-- 震 -->
      <div class="tline broken"><span></span><span></span></div>
      <div class="tline broken"><span></span><span></span></div>
      <div class="tline solid"></div>
    </div>
    <div class="c3-trigram"><!-- 艮 -->
      <div class="tline solid"></div>
      <div class="tline broken"><span></span><span></span></div>
      <div class="tline broken"><span></span><span></span></div>
    </div>
    <div class="c3-trigram"><!-- 兑 -->
      <div class="tline broken"><span></span><span></span></div>
      <div class="tline solid"></div><div class="tline solid"></div>
    </div>
  </div>

  <!-- Orbit 3 (just the ring) -->
  <div class="c3-orbit c3-orbit-3" style="left:50%;top:50%;margin-left:-300px;margin-top:-300px;"></div>

  <div class="c3-center">
    <div style="position:relative;display:inline-block;">
      <span class="c3-title">YARROW</span>
      <span class="c3-title-fill">YARROW</span>
    </div>
    <div class="c3-tagline">六爻在线占卦</div>
  </div>
</div>

</body>
</html>
